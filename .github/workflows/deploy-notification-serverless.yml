name: Deploy Serverless Notification Service

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/notification-serverless/**"

jobs:
  deploy:
    name: Build & Deploy AppSync Notification
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend/notification-serverless

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Serverless & Plugin dependencies
        run: npm ci || npm install

      - name: Install SQS Consumer dependencies
        run: |
          cd functions/sqs-consumer
          npm ci || npm install
          cd -

      - name: Restore Serverless deployment bucket if missing
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name notification-serverless-prod \
            --logical-resource-id ServerlessDeploymentBucket \
            --region ap-southeast-2 \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text 2>/dev/null || true)

          if [ -n "$BUCKET_NAME" ] && [ "$BUCKET_NAME" != "None" ]; then
            if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
              echo "Recreating missing Serverless deployment bucket: $BUCKET_NAME"
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --region ap-southeast-2 \
                --create-bucket-configuration LocationConstraint=ap-southeast-2
            else
              echo "Serverless deployment bucket exists: $BUCKET_NAME"
            fi
          else
            echo "No existing ServerlessDeploymentBucket found for notification-serverless-prod."
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}

      - name: Deploy Serverless Service
        run: npx serverless deploy --stage prod --conceal
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}
