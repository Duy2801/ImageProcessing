name: Deploy API Gateway

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/api-gateway/**"
      - ".github/workflows/deploy-api-gateway.yml"

jobs:
  deploy:
    name: Build & Deploy API Gateway
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/api-gateway/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Restore Serverless deployment bucket if missing
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name api-gateway-prod \
            --logical-resource-id ServerlessDeploymentBucket \
            --region ap-southeast-2 \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text 2>/dev/null || true)

          if [ -n "$BUCKET_NAME" ] && [ "$BUCKET_NAME" != "None" ]; then
            if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
              echo "Recreating missing Serverless deployment bucket: $BUCKET_NAME"
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --region ap-southeast-2 \
                --create-bucket-configuration LocationConstraint=ap-southeast-2
            else
              echo "Serverless deployment bucket exists: $BUCKET_NAME"
            fi
          else
            echo "No existing ServerlessDeploymentBucket found for api-gateway-prod."
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}

      - name: Deploy API Gateway
        run: |
          set +e
          npx serverless deploy --stage prod --region ap-southeast-2 --conceal
          DEPLOY_EXIT_CODE=$?
          set -e

          if [ "$DEPLOY_EXIT_CODE" -eq 0 ]; then
            exit 0
          fi

          echo "Deploy failed. Trying to recreate the Serverless deployment bucket and retry once."
          BUCKET_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name api-gateway-prod \
            --logical-resource-id ServerlessDeploymentBucket \
            --region ap-southeast-2 \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text)

          echo "Recreating missing Serverless deployment bucket: $BUCKET_NAME"
          aws s3api create-bucket \
            --bucket "$BUCKET_NAME" \
            --region ap-southeast-2 \
            --create-bucket-configuration LocationConstraint=ap-southeast-2 || true

          npx serverless deploy --stage prod --region ap-southeast-2 --conceal
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}
          AUTH_SERVICE_FUNCTION_NAME: auth-service-prod-api
          NOTIFICATION_SAVE_SUBSCRIPTION_FUNCTION_NAME: notification-serverless-prod-saveSubscription
          NOTIFICATION_GET_SUBSCRIPTIONS_FUNCTION_NAME: notification-serverless-prod-getSubscriptions
          FRONTEND_API_KEY: ${{ secrets.FRONTEND_API_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
