name: Deploy Image Processing Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/image-pipeline-app/**"
      - ".github/workflows/deploy-pipeline.yml"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    # Run commands inside the image-pipeline-app subdirectory (for monorepo setup)
    defaults:
      run:
        working-directory: ./backend/image-pipeline-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Serverless Framework CLI
        run: npm install -g serverless@3

      - name: Install Dependencies for all stages
        run: |
          for dir in functions/*; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              echo "Installing dependencies in $dir..."
              cd "$dir"
              npm ci || npm install
              cd -
            fi
          done

      - name: Restore missing S3 buckets managed by the stack
        run: |
          restore_bucket() {
            local logical_id="$1"
            local bucket_name

            bucket_name=$(aws cloudformation describe-stack-resource \
              --stack-name image-pipeline-app-prod \
              --logical-resource-id "$logical_id" \
              --region ap-southeast-2 \
              --query "StackResourceDetail.PhysicalResourceId" \
              --output text 2>/dev/null || true)

            if [ -z "$bucket_name" ] || [ "$bucket_name" = "None" ]; then
              echo "No existing $logical_id found for image-pipeline-app-prod."
              return 0
            fi

            if aws s3api head-bucket --bucket "$bucket_name" 2>/dev/null; then
              echo "$logical_id bucket exists: $bucket_name"
              return 0
            fi

            echo "Recreating missing $logical_id bucket: $bucket_name"
            aws s3api create-bucket \
              --bucket "$bucket_name" \
              --region ap-southeast-2 \
              --create-bucket-configuration LocationConstraint=ap-southeast-2

            if [ "$logical_id" = "ImagePipelineBucket" ]; then
              aws s3api put-bucket-encryption \
                --bucket "$bucket_name" \
                --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            fi
          }

          restore_bucket ServerlessDeploymentBucket
          restore_bucket ImagePipelineBucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}

      - name: Serverless Deploy to AWS
        run: |
          set +e
          serverless deploy --stage prod --region ap-southeast-2 --conceal
          DEPLOY_EXIT_CODE=$?
          set -e

          if [ "$DEPLOY_EXIT_CODE" -eq 0 ]; then
            exit 0
          fi

          echo "Deploy failed. Recreating missing stack buckets and retrying once."

          for logical_id in ServerlessDeploymentBucket ImagePipelineBucket; do
            BUCKET_NAME=$(aws cloudformation describe-stack-resource \
              --stack-name image-pipeline-app-prod \
              --logical-resource-id "$logical_id" \
              --region ap-southeast-2 \
              --query "StackResourceDetail.PhysicalResourceId" \
              --output text)

            echo "Recreating bucket if missing: $logical_id -> $BUCKET_NAME"
            aws s3api create-bucket \
              --bucket "$BUCKET_NAME" \
              --region ap-southeast-2 \
              --create-bucket-configuration LocationConstraint=ap-southeast-2 || true
          done

          serverless deploy --stage prod --region ap-southeast-2 --conceal
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}
