name: Deploy Auth Service

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/auth-service/**"
      - ".github/workflows/deploy-auth-service.yml"

jobs:
  deploy:
    name: Build & Deploy Auth
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/auth-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/auth-service/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Restore Serverless deployment bucket if missing
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stack-resource \
            --stack-name auth-service-prod \
            --logical-resource-id ServerlessDeploymentBucket \
            --region ap-southeast-2 \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text 2>/dev/null || true)

          if [ -n "$BUCKET_NAME" ] && [ "$BUCKET_NAME" != "None" ]; then
            if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
              echo "Recreating missing Serverless deployment bucket: $BUCKET_NAME"
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --region ap-southeast-2 \
                --create-bucket-configuration LocationConstraint=ap-southeast-2
            else
              echo "Serverless deployment bucket exists: $BUCKET_NAME"
            fi
          else
            echo "No existing ServerlessDeploymentBucket found for auth-service-prod."
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}

      - name: Deploy Auth Service
        run: npx serverless deploy --stage prod --region ap-southeast-2 --conceal
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PIPELINE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PIPELINE_AWS_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PIPELINE_FUNCTION_NAME: image-pipeline-app-prod-startPipeline
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
