name: Deploy Auth Service

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/auth-service/**"
      - ".github/workflows/deploy-auth-service.yml"

jobs:
  deploy:
    name: Build & Deploy Auth
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/auth-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/auth-service/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Deploy Auth Service
        run: npx serverless deploy --stage prod --region ap-southeast-2 --conceal
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PIPELINE_API_URL: ${{ secrets.PIPELINE_API_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
