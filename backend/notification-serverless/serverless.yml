service: notification-serverless

frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'ap-southeast-2'}

  environment:
    SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable
    HISTORY_TABLE: !Ref NotificationHistoryTable
    APPSYNC_ENDPOINT: ${appsync:url}
    APPSYNC_API_KEY: ${appsync:apiKey.NotificationApiKey}
    EMAIL_FROM: ${self:custom.emailFrom}
    WEBHOOK_RETRY_LIMIT: "3"

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:UpdateItem
          Resource:
            - !GetAtt SubscriptionsTable.Arn
            - !GetAtt NotificationHistoryTable.Arn
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource:
            - "*"
        - Effect: Allow
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - arn:aws:sqs:${self:provider.region}:${self:custom.accountId}:image-pipeline-app-${self:provider.stage}-notification-queue

plugins:
  - serverless-appsync-plugin

custom:
  accountId: ${env:AWS_ACCOUNT_ID, '000000000000'}
  emailFrom: ${env:EMAIL_FROM, 'hungzazed01@gmail.com'}

appSync:
  name: notification-appsync-${self:provider.stage}
  authentication:
    type: API_KEY
  apiKeys:
    - name: NotificationApiKey
      description: "AppSync API Key for Notification AppSync"
  schema: graphql/schema.graphql

  dataSources:
    NoneDataSource:
      type: NONE

  resolvers:
    Mutation.publishProgress:
      kind: UNIT
      dataSource: NoneDataSource
      request: mapping-templates/publishProgress-request.vtl
      response: mapping-templates/publishProgress-response.vtl

package:
  individually: true

functions:
  sqsConsumer:
    handler: functions/sqs-consumer/index.handler
    description: Consumes processing events from SQS and dispatches progress notifications
    timeout: 30
    package:
      patterns:
        - "functions/sqs-consumer/**"
        - "common/**"
    events:
      - sqs:
          arn: arn:aws:sqs:${self:provider.region}:${self:custom.accountId}:image-pipeline-app-${self:provider.stage}-notification-queue
          batchSize: 10

  saveSubscription:
    handler: functions/subscriptions/index.save
    description: Internal Lambda to save user notification subscriptions
    timeout: 10
    package:
      patterns:
        - "functions/subscriptions/**"
        - "common/**"

  getSubscriptions:
    handler: functions/subscriptions/index.get
    description: Internal Lambda to get user notification subscriptions
    timeout: 10
    package:
      patterns:
        - "functions/subscriptions/**"
        - "common/**"

resources:
  Resources:
    SubscriptionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-subscriptions
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: id
            KeyType: RANGE

    NotificationHistoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-history
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: jobId
            AttributeType: S
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: jobId
            KeyType: HASH
          - AttributeName: id
            KeyType: RANGE

  Outputs:
    SaveSubscriptionFunctionName:
      Description: Internal save subscription Lambda function name
      Value: !Ref SaveSubscriptionLambdaFunction
    GetSubscriptionsFunctionName:
      Description: Internal get subscriptions Lambda function name
      Value: !Ref GetSubscriptionsLambdaFunction
